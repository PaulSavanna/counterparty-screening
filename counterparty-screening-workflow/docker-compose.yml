services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: counterparty_risk
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d counterparty_risk"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    environment:
      APP_ENV: production
      APP_VERSION: 0.5.0
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/counterparty_risk
      AUTO_MIGRATE_ON_STARTUP: "true"
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
